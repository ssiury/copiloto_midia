services:
  app:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/html
    # Sem `environment:` aqui de propósito: a app lê backend/.env (montado
    # via volume acima), que já tem DB_HOST=postgres, REDIS_HOST=redis etc.
    # Duplicar essas variáveis aqui como env var real do container quebra o
    # phpunit.xml — o Laravel prioriza uma env var já presente no processo
    # sobre o override de teste, então `php artisan test` acabava rodando
    # contra o Postgres de dev de verdade (e o RefreshDatabase apagava os
    # dados). Se precisar mudar host/porta do banco, edite backend/.env.
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:stable-alpine
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${VITE_PORT}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  frontend_node_modules:
